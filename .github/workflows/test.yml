name: GraphSkill Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        working-directory: src/python
        run: uv sync --all-extras
      
      - name: Run unit tests
        working-directory: src/python
        run: uv run pytest tests/unit/ -v --tb=short --cov=graphskill --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/python/htmlcov/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      neo4j:
        image: neo4j:5-community
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password123
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "curl -f http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      etcd:
        image: quay.io/coreos/etcd:v3.5.5
        ports:
          - 2379:2379
          - 2380:2380
        env:
          ETCD_NAME: etcd
          ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
          ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
          ETCD_INITIAL_CLUSTER: etcd=http://etcd:2380
      
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
          - 9001:9001
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: server /data --console-address ":9001"
      
      milvus:
        image: milvusdb/milvus:v2.4-latest
        ports:
          - 19530:19530
        env:
          ETCD_ENDPOINTS: etcd:2379
          MINIO_ADDRESS: minio:9000
        options: >-
          --health-cmd "curl -f http://localhost:19530/v1/vector/collections || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        working-directory: src/python
        run: uv sync --all-extras
      
      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          # Redis Configuration
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_DB=0
          REDIS_PASSWORD=
          
          # Neo4j Configuration
          NEO4J_URI=bolt://localhost:7687
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=password123
          NEO4J_DATABASE=neo4j
          
          # Milvus Configuration
          MILVUS_HOST=localhost
          MILVUS_PORT=19530
          MILVUS_COLLECTION_NAME=test_skill_embeddings
          
          # Test Settings
          TEST_SKILL_DIR=/tmp/test_skills
          TEST_TIMEOUT_SECONDS=30
          EOF
      
      - name: Run integration tests
        working-directory: src/python
        run: uv run pytest tests/integration/ -v --tb=short --no-cov
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password123
          MILVUS_HOST: localhost
          MILVUS_PORT: 19530

  e2e-tests:
    name: E2E Tests (LLM Required)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      neo4j:
        image: neo4j:5-community
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password123
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "curl -f http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      etcd:
        image: quay.io/coreos/etcd:v3.5.5
        ports:
          - 2379:2379
          - 2380:2380
        env:
          ETCD_NAME: etcd
          ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
          ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
          ETCD_INITIAL_CLUSTER: etcd=http://etcd:2380
      
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
          - 9001:9001
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: server /data --console-address ":9001"
      
      milvus:
        image: milvusdb/milvus:v2.4-latest
        ports:
          - 19530:19530
        env:
          ETCD_ENDPOINTS: etcd:2379
          MINIO_ADDRESS: minio:9000
        options: >-
          --health-cmd "curl -f http://localhost:19530/v1/vector/collections || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        working-directory: src/python
        run: uv sync --all-extras
      
      - name: Run E2E tests
        working-directory: src/python
        run: uv run pytest tests/e2e/ -v --tb=short --no-cov -m "not storage"
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password123
          MILVUS_HOST: localhost
          MILVUS_PORT: 19530
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_LLM_MODEL: ${{ secrets.OPENAI_LLM_MODEL }}

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        working-directory: src/python
        run: uv sync --all-extras
      
      - name: Run ruff check
        working-directory: src/python
        run: uv run ruff check graphskill/ tests/
      
      - name: Run ruff format check
        working-directory: src/python
        run: uv run ruff format --check graphskill/ tests/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        working-directory: src/python
        run: uv sync --all-extras
      
      - name: Run pyright
        working-directory: src/python
        run: uv run pyright graphskill/